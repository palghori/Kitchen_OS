version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: kitchenos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./kitchenos-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://root:rootpassword@db:5432/kitchenos?schema=public"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      - db
      - redis

  frontend:
    build: ./kitchenos-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
    depends_on:
      - backend

volumes:
  pgdata:
