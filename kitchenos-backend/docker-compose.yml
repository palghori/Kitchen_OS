version: '3.8'

services:
  db:
    image: postgres:15
    container_name: dkos_postgres
    environment:
      POSTGRES_USER: dkos_user
      POSTGRES_PASSWORD: dkos_password
      POSTGRES_DB: dark_kitchen_os
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dkos_user -d dark_kitchen_os"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dkos_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
